name: Test Hello World Program

on:
  push:
    branches: [main]
    paths:
      - "programs/hello-world/**"        # ✅ fixed path
  pull_request:
    branches: [main]
    paths:
      - "programs/hello-world/**"        # ✅ consistent
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: programs/hello-world   # ✅ correct folder

    steps:
      - uses: actions/checkout@v4

      # ✅ NEW: Install Rust 1.85.0 (supports edition2024)
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.85.0
          override: true

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.31.1 anchor-cli --locked

      - name: Generate keypair
        run: solana-keygen new --outfile $HOME/.config/solana/id.json --no-bip39-passphrase --force

      - name: Install Node dependencies
        run: yarn install

      - name: Run Anchor tests
        run: anchor test
        env:
          ANCHOR_PROVIDER_URL: "http://127.0.0.1:8899"
          ANCHOR_WALLET: "$HOME/.config/solana/id.json"
