name: Test Hello World Program

on:
  push:
    branches: [main]
    paths:
      - "hello_world/**"
  pull_request:
    branches: [main]
    paths:
      - "hello_world/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: hello_world

    steps:
      - uses: actions/checkout@v4

      # ✅ Fix: Install Rust 1.85.0 properly
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      # ✅ Verify the correct version is installed
      - name: Verify Rust version
        run: |
          rustc --version
          cargo --version

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.31.1 anchor-cli --locked

      - name: Generate keypair
        run: solana-keygen new --outfile $HOME/.config/solana/id.json --no-bip39-passphrase --force

      - name: Install Node dependencies
        run: yarn install

      - name: Run Anchor tests
        run: anchor test
        env:
          ANCHOR_PROVIDER_URL: "http://127.0.0.1:8899"
          ANCHOR_WALLET: "$HOME/.config/solana/id.json"